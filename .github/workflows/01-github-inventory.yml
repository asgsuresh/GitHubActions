name: Generate Organization Teams Inventory

on:
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  inventory:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.ASGSREPOS }} # Use your custom PAT here
      ORGANIZATION: "asgsOrg"       # Replace with your GitHub Org name

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Fetch Teams, Members, and Repositories
        run: |
          echo "### Fetching data for organization: $ORGANIZATION ###"
          
          # 1. Fetch all teams in the organization
          # Using pagination to ensure we capture more than 100 teams if necessary
          TEAMS=$(gh api --paginate "/orgs/$ORGANIZATION/teams" --jq '.[] | {id: .id, slug: .slug, name: .name}')
          
          if [ -z "$TEAMS" ]; then
            echo "No teams found or token lacks permissions."
            exit 1
          fi

          echo "=========================================" > inventory.txt
          echo "      GITHUB ORGANIZATION INVENTORY      " >> inventory.txt
          echo "=========================================" >> inventory.txt
          
          # 2. Iterate through each discovered team
          echo "$TEAMS" | jq -c '.' | while read -r team; do
            TEAM_SLUG=$(echo "$team" | jq -r '.slug')
            TEAM_NAME=$(echo "$team" | jq -r '.name')
            
            echo "" >> inventory.txt
            echo "👥 TEAM: $TEAM_NAME (Slug: $TEAM_SLUG)" >> inventory.txt
            echo "-----------------------------------------" >> inventory.txt
            
            # Fetch and append team members
            echo "  🧍 Members:" >> inventory.txt
            MEMBERS=$(gh api --paginate "/orgs/$ORGANIZATION/teams/$TEAM_SLUG/members" --jq '.[].login' 2>/dev/null)
            if [ -z "$MEMBERS" ]; then
              echo "    (No members found)" >> inventory.txt
            else
              echo "$MEMBERS" | sed 's/^/    - /' >> inventory.txt
            fi
            
            # Fetch and append repositories tied to this team
            echo "  📂 Associated Repositories:" >> inventory.txt
            REPOS=$(gh api --paginate "/orgs/$ORGANIZATION/teams/$TEAM_SLUG/repos" --jq '.[].full_name' 2>/dev/null)
            if [ -z "$REPOS" ]; then
              echo "    (No repositories mapped)" >> inventory.txt
            else
              echo "$REPOS" | sed 's/^/    - /' >> inventory.txt
            fi
            
            echo "Processed team: $TEAM_NAME"
          done

      - name: Display Inventory in Logs
        run: cat inventory.txt

      - name: Upload Inventory Report
        uses: actions/artifact@v4
        with:
          name: github-org-inventory
          path: inventory.txt
