name: List Org Repository URLs

on:
  workflow_dispatch: # Allows manual triggering from the Actions tab

jobs:
  list-urls:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch and List Repo URLs
        env:
          GH_TOKEN: ${{ secrets.ASGSREPOS }}
        run: |
          gh repo list "YOUR_ORGANIZATION_NAME" --limit 1000 --json url --jq '.[].url'
